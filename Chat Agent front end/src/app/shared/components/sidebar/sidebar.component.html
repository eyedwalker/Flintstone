<div class="sidebar">
  <nav class="nav-list">
    <a
      *ngFor="let item of navItems"
      class="nav-item"
      [class.active]="isActive(item.route, item.exact)"
      [routerLink]="item.route"
      [hidden]="!isVisible(item)"
      matRipple>
      <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
      <span class="nav-label">{{ item.label }}</span>
    </a>
  </nav>
</div>
