<mat-toolbar class="app-header" color="primary">
  <div class="header-left">
    <mat-icon class="logo-icon">smart_toy</mat-icon>
    <span class="app-name">Bedrock Chat Configurator</span>
  </div>

  <div class="header-spacer"></div>

  <div class="header-right" *ngIf="auth.isAuthenticated">
    <!-- Org picker (only if user belongs to multiple orgs) -->
    <button mat-button [matMenuTriggerFor]="orgMenu" class="org-picker"
            *ngIf="(orgCtx.orgs$ | async)?.length! > 1">
      <mat-icon>business</mat-icon>
      <span class="org-name">{{ (orgCtx.activeOrg$ | async)?.organizationName || 'Organization' }}</span>
      <mat-icon>arrow_drop_down</mat-icon>
    </button>
    <mat-menu #orgMenu="matMenu">
      <button mat-menu-item *ngFor="let org of orgCtx.orgs$ | async"
              (click)="switchOrg(org)"
              [class.active-org]="org.organizationId === orgCtx.activeOrgId">
        <mat-icon>{{ org.organizationId === orgCtx.activeOrgId ? 'radio_button_checked' : 'radio_button_unchecked' }}</mat-icon>
        <span>{{ org.organizationName }}</span>
        <span class="org-role-badge">{{ org.role }}</span>
      </button>
    </mat-menu>

    <!-- Demo widget picker (admin+ only) -->
    <button mat-button [matMenuTriggerFor]="demoMenu" class="demo-picker"
            *ngIf="orgCtx.hasRole('admin') && assistants.length">
      <mat-icon [class.demo-active]="demoWidget.isDemoActive$ | async">
        {{ (demoWidget.isDemoActive$ | async) ? 'chat' : 'chat_bubble_outline' }}
      </mat-icon>
      <span class="demo-label">Demo</span>
      <mat-icon>arrow_drop_down</mat-icon>
    </button>
    <mat-menu #demoMenu="matMenu">
      <button mat-menu-item (click)="setDemoAssistant(null)"
              [class.active-demo-item]="!demoAssistantId">
        <mat-icon>block</mat-icon>
        <span>Off</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item *ngFor="let a of assistants"
              (click)="setDemoAssistant(a.id)"
              [class.active-demo-item]="demoAssistantId === a.id">
        <mat-icon>{{ demoAssistantId === a.id ? 'radio_button_checked' : 'radio_button_unchecked' }}</mat-icon>
        <span>{{ a.name }}</span>
      </button>
    </mat-menu>

    <!-- User menu -->
    <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-btn">
      <mat-icon>account_circle</mat-icon>
    </button>
    <mat-menu #userMenu="matMenu">
      <div class="user-info-menu">
        <div class="user-name">{{ auth.currentUser?.attributes?.['name'] }}</div>
        <div class="user-email">{{ auth.currentUser?.email }}</div>
        <div class="user-role" *ngIf="orgCtx.currentRole">
          Role: {{ orgCtx.currentRole }}
        </div>
      </div>
      <mat-divider></mat-divider>
      <button mat-menu-item routerLink="/team/mfa" *ngIf="orgCtx.hasRole('owner')">
        <mat-icon>security</mat-icon>
        <span>MFA Setup</span>
      </button>
      <button mat-menu-item routerLink="/billing" *ngIf="orgCtx.hasRole('admin')">
        <mat-icon>credit_card</mat-icon>
        <span>Billing</span>
      </button>
      <button mat-menu-item (click)="signOut()">
        <mat-icon>logout</mat-icon>
        <span>Sign Out</span>
      </button>
    </mat-menu>
  </div>
</mat-toolbar>
