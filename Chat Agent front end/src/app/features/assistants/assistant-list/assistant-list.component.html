<div class="page-header">
  <div>
    <h1 class="page-title">AI Assistants</h1>
    <p class="page-subtitle">Configure and deploy your Bedrock-powered chat assistants</p>
  </div>
  <button mat-flat-button color="primary" (click)="createAssistant()">
    <mat-icon>add</mat-icon> New Assistant
  </button>
</div>

<div *ngIf="loading" class="loading-state">
  <mat-spinner diameter="40"></mat-spinner>
</div>

<div *ngIf="!loading && assistants.length === 0" class="empty-state">
  <mat-icon class="empty-icon">smart_toy</mat-icon>
  <h3>No assistants yet</h3>
  <p>Create your first AI assistant to get started</p>
  <button mat-flat-button color="primary" (click)="createAssistant()">Create Assistant</button>
</div>

<div class="assistant-grid" *ngIf="!loading && assistants.length > 0">
  <mat-card
    *ngFor="let a of assistants"
    class="assistant-card"
    (click)="openAssistant(a.id)">
    <mat-card-header>
      <div class="assistant-icon" [style.background]="a.widgetConfig.primaryColor">
        <mat-icon>smart_toy</mat-icon>
      </div>
      <mat-card-title>{{ a.name }}</mat-card-title>
      <mat-card-subtitle>{{ a.description || 'No description' }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <div class="assistant-meta">
        <span class="status-badge" [class]="getStatusColor(a.status)">{{ a.status }}</span>
        <span class="model-label">{{ a.modelConfig.modelName }}</span>
      </div>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button color="primary" [routerLink]="['/assistants', a.id, 'knowledge-base']" (click)="$event.stopPropagation()">
        <mat-icon>folder</mat-icon> Content
      </button>
      <button mat-button color="primary" [routerLink]="['/assistants', a.id, 'embed']" (click)="$event.stopPropagation()">
        <mat-icon>code</mat-icon> Embed
      </button>
      <button mat-button color="primary" [routerLink]="['/assistants', a.id, 'metrics']" (click)="$event.stopPropagation()">
        <mat-icon>analytics</mat-icon> Metrics
      </button>
    </mat-card-actions>
  </mat-card>
</div>
